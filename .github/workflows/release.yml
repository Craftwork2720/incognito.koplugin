name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ZIP
        run: |
          mkdir incognito.koplugin
          cp -r main.lua _meta.lua LICENSE README.md icons incognito.koplugin/
          zip -r incognito.koplugin.zip incognito.koplugin/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: incognito.koplugin.zip
          body: |
            ## Installation
            1. Download `incognito.koplugin.zip`
            2. Extract to `koreader/plugins/`
            3. Restart KOReader
name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ZIP
        run: |
          mkdir incognito.koplugin
          cp main.lua _meta.lua incognito.koplugin/
          zip -r incognito.koplugin.zip incognito.koplugin/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: incognito.koplugin.zip
          generate_release_notes: true
